services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* are baked into the client bundle at build time.
        # API base URL is required; media base URL is optional (the app falls
        # back to the default S3 bucket when it's empty), so default it to "".
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL:-}
    ports:
      - "3000:3001"
    environment:
      NODE_ENV: production
    restart: unless-stopped
