name: RA Frontend Docker Deploy

on:
  push:
    branches: [suvesh]

env:
  IMAGE_NAME: suveshtglevel/ra-frontend
  CONTAINER_NAME: ra-frontend
  APP_PORT: 3000

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            IMAGE="suveshtglevel/ra-frontend:latest"
            CONTAINER="ra-frontend"
            PORT="3000"

            echo "==> Pulling latest image..."
            docker pull "$IMAGE"

            echo "==> Running health check on new image..."
            docker run --rm "$IMAGE" node --version || {
              echo "Image health check failed"
              exit 1
            }

            echo "==> Stopping old container..."
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            echo "==> Killing any process holding port $PORT..."
            EXISTING=$(docker ps -q --filter "publish=$PORT")
            if [ -n "$EXISTING" ]; then
              docker stop "$EXISTING" || true
            fi

            echo "==> Starting new container..."
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              -p "$PORT:$PORT" \
              "$IMAGE"

            echo "==> Waiting for container to be healthy..."
            HEALTHY=false
            for i in $(seq 1 10); do
              echo "  Attempt $i/10..."
              if curl -sf http://localhost:$PORT > /dev/null 2>&1; then
                HEALTHY=true
                break
              fi
              sleep 3
            done

            if [ "$HEALTHY" != "true" ]; then
              echo "!!! Container failed health check. Dumping logs..."
              docker logs "$CONTAINER" --tail 50
              docker stop "$CONTAINER" && docker rm "$CONTAINER"
              exit 1
            fi

            echo "==> Pruning dangling images..."
            docker image prune -f

            echo "==> Container status:"
            docker ps --filter "name=$CONTAINER"

            echo "Deployment successful!"